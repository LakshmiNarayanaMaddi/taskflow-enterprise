

services:

  # ─── PostgreSQL ───────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: taskflow-postgres
    environment:
      POSTGRES_USER: taskflow
      POSTGRES_PASSWORD: taskflow123
      POSTGRES_DB: taskflow_identity
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - taskflow-network

  # ─── MongoDB ──────────────────────────────────────────────
  mongodb:
    image: mongo:7-jammy
    container_name: taskflow-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: taskflow
      MONGO_INITDB_ROOT_PASSWORD: taskflow123
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - taskflow-network

  # ─── Redis ────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: taskflow-redis
    command: redis-server --requirepass taskflow123
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - taskflow-network

  # ─── Zookeeper (required by Kafka) ────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: taskflow-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - taskflow-network
# ─── Apache Kafka ─────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: taskflow-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT_INTERNAL:PLAINTEXT,PLAINTEXT_EXTERNAL:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT_INTERNAL://taskflow-kafka:29092,PLAINTEXT_EXTERNAL://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: true
    networks:
      - taskflow-network
# ─── Kafka UI ─────────────────────────────────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: taskflow-kafka-ui
    depends_on:
      - kafka
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: taskflow-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: taskflow-kafka:29092
    networks:
      - taskflow-network

  # ─── Keycloak (OAuth 2.0 identity provider) ───────────────
  keycloak:
    image: quay.io/keycloak/keycloak:24.0.1
    container_name: taskflow-keycloak
    command: start-dev
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin123
    ports:
      - "8180:8080"
    networks:
      - taskflow-network

# ─── Elasticsearch ────────────────────────────────────────
  elasticsearch:
    image: elasticsearch:8.13.0
    container_name: taskflow-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    networks:
      - taskflow-network

  # ─── Kibana (Elasticsearch UI) ────────────────────────────
  kibana:
    image: kibana:8.13.0
    container_name: taskflow-kibana
    depends_on:
      - elasticsearch
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    networks:
      - taskflow-network

# ─── Named volumes (data persists when containers stop) ─────
volumes:
  postgres-data:
  mongo-data:
  redis-data:
  elasticsearch-data:

# ─── Network (all containers talk to each other) ────────────
networks:
  taskflow-network:
    driver: bridge