server:
  port: 8084

spring:
  application:
    name: notification-service

  # MongoDB connection
  data:
    mongodb:
      uri: mongodb://taskflow:taskflow123@localhost:27017/taskflow_notifications?authSource=admin
      database: taskflow_notifications

  # Kafka consumer configuration
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: notification-service-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

  # Email configuration (Gmail SMTP)
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:lakshmi.narayana192@gmail.com}
    password: ${MAIL_PASSWORD:xxxx xxxx xxxx xxxx}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.taskflow: DEBUG
    org.springframework.kafka: INFO
