server:
  port: 8082

spring:
  application:
    name: identity-service

  # PostgreSQL database connection
  datasource:
    url: jdbc:postgresql://127.0.0.1:5432/taskflow_identity
    username: taskflow
    password: taskflow123
    driver-class-name: org.postgresql.Driver

  # JPA / Hibernate settings
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  # Security ? disable default login page for now
  security:
    user:
      name: admin
      password: admin123

# Actuator ? health check endpoint
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

# Logging
logging:
  level:
    com.taskflow: DEBUG
    org.springframework.security: DEBUG

# JWT Configuration
jwt:
  secret: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
  expiration: 86400000

  spring:
    security:
      oauth2:
        resourceserver:
          jwt:
            issuer-uri: http://localhost:8180/realms/taskflow

  keycloak:
    realm: taskflow
    auth-server-url: http://localhost:8180
    resource: taskflow-frontend
    client-secret: YOUR_CLIENT_SECRET_FROM_STEP_4